name: Docker Build Main

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".github/FUNDING.yml"
      - ".github/workflows/auto-label.prompt.md"
  workflow_dispatch:

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build Latest
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: read
      packages: write
    with:
      tag: latest
      ref: ${{ github.sha }}
      tags: |
        ghcr.io/${{ github.repository }}:${{ github.sha }}
